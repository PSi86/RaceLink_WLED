; ------------------------------------------------------------------------------
; External Usermod profile for WLED
; Replace the Git URL below with the final URL of your external RaceLink usermod repo
; Expected repo shape: library.json + usermod sources in the repo root
; Example:
; custom_usermods = https://github.com/PSi86/wled-usermod-racelink_wled.git#main battery
; ------------------------------------------------------------------------------

[platformio]
default_envs = RaceLink_Node_v4_s3_llcc68

[env:RaceLink_Node_v1_c3_ct62]
extends = esp32c3
platform = ${esp32c3.platform}
framework = arduino
board = esp32-c3-devkitm-1
board_build.partitions = ${esp32.default_partitions}

;; Usermod aktivieren (neues System)
custom_usermods = https://github.com/PSi86/RaceLink_WLED.git#main battery
build_flags = ${common.build_flags}
  ${esp32c3.build_flags}

  -D DEV_TYPE=10 ;; custom device type for GC V1
  -D WLED_RELEASE_NAME=\"RaceLink_Node_V1_TYPE_10\"
  -D WLED_AP_SSID='"WLED_RaceLink_AP"'

  -D WLED_WATCHDOG_TIMEOUT=0
  -D LOLIN_WIFI_FIX ; seems to work much better with this
  ;-D ARDUINO_USB_CDC_ON_BOOT=1 ;; for virtual CDC USB
  -D ARDUINO_USB_CDC_ON_BOOT=0   ;; for serial-to-USB chip

  ; --------------- WLED RaceLink specific defines
  -D WLED_DISABLE_ALEXA
  -D WLED_DISABLE_HUESYNC
  -D WLED_DISABLE_LOXONE
  -D WLED_DISABLE_INFRARED
  -D WLED_DISABLE_WEBSOCKETS
  -D WLED_DISABLE_MQTT
  -D WLED_DISABLE_ADALIGHT
  -D WLED_DISABLE_2D
  -D WLED_DISABLE_PXMAGIC
  -D WLED_DISABLE_ESPNOW

  ;-D LED_BUILTIN=2 ;; # GPIO of built-in LED
  ;-D WLED_MAX_ANALOG_CHANNELS=0 ;; no PWM HW pins available NOT working, can still configure in UI
  -D WLED_MAX_BUTTONS=2 ;; we use 2 buttons (reset, mode)
  -D BTNPIN=9 ;; GPIO of mode button
  -D WLED_MAX_BUSSES=1 ;; we only need 1 LED strip
  -D DATA_PINS=2 ;;0 GPIO of data pin for LED strip
  -D LED_TYPES=TYPE_WS2812_RGB ;; 22 see const.h (TYPE_xxxx)
  -D DEFAULT_LED_COLOR_ORDER=COL_ORDER_GRB ;; 11 see const.h (COL_ORDER_xxxx)
  -D PIXEL_COUNTS=100 ;; number of LEDs on the strip

  -D WLED_LONG_FACTORY_RESET=15000 ;; long press for reset duration in ms
  -D WLED_LONG_AP=5000 ;; long press for AP duration in ms

  ; --- RaceLink / SX1262: feste Pins des HT-CT62 ---
  -D RACELINK_SX1262
  -D RACELINK_PIN_SCK=10
  -D RACELINK_PIN_MISO=6
  -D RACELINK_PIN_MOSI=7
  -D RACELINK_PIN_NSS=8
  -D RACELINK_PIN_DIO1=3
  -D RACELINK_PIN_BUSY=4
  -D RACELINK_PIN_RST=5

  ; --- Funk-Parameter (EU-typisch, kannst du anpassen) ---
  ;868000000UL
  -D RACELINK_FREQ_HZ=867700000UL
  -D RACELINK_BW_KHZ=125.0
  -D RACELINK_SF=7
  -D RACELINK_CR=5
  -D RACELINK_SYNC_WORD=0x12
  -D RACELINK_PREAMBLE=8
  -D RACELINK_TX_POWER=14

  ;-D USERMOD_BATTERY ;; enabled in custom_usermods, only config here
  -D USERMOD_BATTERY_MEASUREMENT_PIN=0 ;; GPIO pin to measure battery voltage 1
  -D USERMOD_BATTERY_MEASUREMENT_INTERVAL=20000 ;; in ms default: 30000 (30s)
  -D USERMOD_BATTERY_DEFAULT_TYPE=2 ; LiIon
  -D USERMOD_BATTERY_AUTO_OFF_ENABLED=false
  ;-D USERMOD_BATTERY_AUTO_OFF_ENABLED=true
  -D USERMOD_BATTERY_AUTO_OFF_THRESHOLD=5
  -D USERMOD_BATTERY_LOW_POWER_INDICATOR_ENABLED=false
  ;-D USERMOD_BATTERY_LOW_POWER_INDICATOR_ENABLED=true
  -D USERMOD_BATTERY_LOW_POWER_INDICATOR_THRESHOLD=10
  -D USERMOD_BATTERY_LOW_POWER_INDICATOR_PRESET=2
  -D USERMOD_BATTERY_LOW_POWER_INDICATOR_DURATION=5
  -D USERMOD_BATTERY_AVERAGING_ALPHA=0.2f ;; no averaging, 0.1f=strong averaging
  ;-D USERMOD_BATTERY_VOLTAGE_MULTIPLIER=2.0f ; default for esp32 (for voltage divider 100k and 100k?)
  ;-D USERMOD_BATTERY_LION_MIN_VOLTAGE=2.8f
  ;-D USERMOD_BATTERY_VOLTAGE_MULTIPLIER 15.5f // 2s 18650 esp8622 felix board
  ;-D USERMOD_BATTERY_CALIBRATION -3.0f // 2s 18650 esp8622 felix board
  ;-D USERMOD_BATTERY_MAX_VOLTAGE 8.4f
  ;-D USERMOD_BATTERY_MIN_VOLTAGE 5.6f

upload_speed = 460800
;upload_speed = 19200 ;; must be 9600 for the HT-CT62 bootloader
build_unflags = ${common.build_unflags}
lib_deps = ${esp32c3.lib_deps}
  jgromes/RadioLib @ ^7.4.0   ; falls dein Usermod RadioLib nutzt

