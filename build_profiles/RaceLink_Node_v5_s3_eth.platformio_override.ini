; ------------------------------------------------------------------------------
; RaceLink Ethernet node (Block E) -- Ethernet (W5500/UDP) variant of the v4 node.
; Same usermod, transport swapped to Ethernet via -D RACELINK_ETH. The W5500 is
; driven by the self-contained racelink_w5500_udp.h (SPI) -- no external Ethernet
; library is used (none compile on the pinned Tasmota 2.0.18 core). DEV_TYPE 13 =
; NODE_WLED_REV5.
; NOTE: register DEV_TYPE 13 in the host device-type table so the UI labels it.
; ------------------------------------------------------------------------------

[platformio]
default_envs = RaceLink_Node_v5_s3_eth

[env:RaceLink_Node_v5_s3_eth]
extends = esp32s3
framework = arduino
platform = ${esp32s3.platform}
board = esp32-s3-devkitc-1
board_build.partitions = ${esp32.default_partitions}
board_build.flash_mode = qio
board_build.f_flash = 80000000L
custom_usermods = https://github.com/PSi86/RaceLink_WLED.git#main battery
build_unflags = ${common.build_unflags}
build_flags = ${common.build_flags} ${esp32s3.build_flags}

  -D DEV_TYPE=13 ;; custom device type for RaceLink_Node V5 (Ethernet) -- NODE_WLED_REV5
  -D WLED_RELEASE_NAME=\"RaceLink_Node_V5_TYPE_13\"
  -D WLED_AP_SSID='"WLED_RaceLink_AP"'

  ;-D WLED_DEBUG

  -D ARDUINO_USB_CDC_ON_BOOT=0  ;; for boards with serial-to-USB chip

  -D ESP32
  -D ARDUINO_ARCH_ESP32
  -D ARDUINO_ARCH_ESP32S3
  -D CONFIG_IDF_TARGET_ESP32S3=1
  -D CO

  -D WLED_WATCHDOG_TIMEOUT=0

  -D WLED_DISABLE_ALEXA
  -D WLED_DISABLE_HUESYNC
  -D WLED_DISABLE_LOXONE
  -D WLED_DISABLE_INFRARED
  -D WLED_DISABLE_MQTT
  -D WLED_DISABLE_ADALIGHT
  -D WLED_DISABLE_PXMAGIC
  -D WLED_DISABLE_ESPNOW

  -D WLED_MAX_BUTTONS=2 ;; we use 2 buttons (reset, mode)
  -D BTNPIN=0 ;; GPIO of mode button
  -D WLED_MAX_BUSSES=2 ;; we only need 2 LED strips
  ;; LED2 moved off GPIO11 (now W5500 MOSI) to freed radio pin GPIO4. LED1 stays on GPIO2.
  -D DATA_PINS=2,4 ;; GPIO of data pins for LED strips
  -D LED_TYPES=TYPE_WS2812_RGB,TYPE_WS2812_RGB ;; see const.h (TYPE_xxxx)
  -D DEFAULT_LED_COLOR_ORDER=COL_ORDER_GRB ;; see const.h (COL_ORDER_xxxx)
  -D PIXEL_COUNTS=100 ;; number of LEDs on the strip

  -D WLED_LONG_FACTORY_RESET=15000 ;; long press for reset duration in ms
  -D WLED_LONG_AP=5000 ;; long press for AP duration in ms

  ; --- RaceLink / Ethernet (Waveshare ESP32-S3-ETH, Wiznet W5500) ---
  -D RACELINK_ETH
  -D RACELINK_ETH_MISO=12
  -D RACELINK_ETH_MOSI=11
  -D RACELINK_ETH_SCLK=13
  -D RACELINK_ETH_CS=14
  -D RACELINK_ETH_RST=9
  -D RACELINK_ETH_INT=10
  -D RACELINK_ETH_NODE_PORT=5078
  -D RACELINK_ETH_HOST_PORT=5079
  ;; Static IP (PoC; DHCP is a later add). Adjust to your LAN/subnet.
  -D RACELINK_ETH_IP=192,168,1,177
  -D RACELINK_ETH_SUBNET=255,255,255,0
  -D RACELINK_ETH_GATEWAY=192,168,1,1

  ;-D USERMOD_BATTERY ;; enabled in custom_usermods, only config here
  -D USERMOD_BATTERY_MEASUREMENT_PIN=1 ;; GPIO pin to measure battery voltage
  -D USERMOD_BATTERY_MEASUREMENT_INTERVAL=20000 ;; in ms
  -D USERMOD_BATTERY_DEFAULT_TYPE=2 ; LiIon
  -D USERMOD_BATTERY_AUTO_OFF_ENABLED=false
  -D USERMOD_BATTERY_AUTO_OFF_THRESHOLD=5
  -D USERMOD_BATTERY_LOW_POWER_INDICATOR_ENABLED=false
  -D USERMOD_BATTERY_LOW_POWER_INDICATOR_THRESHOLD=10
  -D USERMOD_BATTERY_LOW_POWER_INDICATOR_PRESET=2
  -D USERMOD_BATTERY_LOW_POWER_INDICATOR_DURATION=5
  -D USERMOD_BATTERY_AVERAGING_ALPHA=0.2f
  -D USERMOD_BATTERY_VOLTAGE_MULTIPLIER=11.2f

upload_speed = 460800
;; No external Ethernet lib: W5500 is driven by racelink_w5500_udp.h (SPI).
;; RadioLib is still pulled via the usermod library.json but unused on ETH builds.
lib_deps = ${esp32s3.lib_deps}
